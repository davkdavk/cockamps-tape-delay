name: build

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake ninja-build pkg-config zip \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxext-dev \
            libfreetype6-dev libasound2-dev libfontconfig1-dev libgl1-mesa-dev
      - name: Clone JUCE
        run: git clone --branch 7.0.9 --depth 1 https://github.com/juce-framework/JUCE.git ../JUCE
      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DJUCE_PATH=../JUCE
      - name: Build
        run: cmake --build build --parallel

      - name: Package VST3
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cd build/TapeDelay_artefacts/Release/VST3
          zip -r "$GITHUB_WORKSPACE/dist/CockAmps-TapeDelay-linux.vst3.zip" TapeDelay.vst3

      - name: Upload VST3 artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: linux-vst3
          path: dist/CockAmps-TapeDelay-linux.vst3.zip

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Install 7-Zip
        run: choco install -y 7zip
      - name: Clone JUCE
        run: git clone --branch 7.0.9 --depth 1 https://github.com/juce-framework/JUCE.git ..\JUCE
      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DJUCE_PATH="..\JUCE"
      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Create install script
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          @"
          ;!@Install@!UTF-8!
          Title="CockAmps: Tape Delay"
          BeginPrompt="Install CockAmps: Tape Delay VST3 to user VST3 folder?"
          RunProgram="cmd /c \"mkdir %USERPROFILE%\\AppData\\Local\\Programs\\VST3 2>nul & xcopy /E /I /Y TapeDelay.vst3 %USERPROFILE%\\AppData\\Local\\Programs\\VST3\\TapeDelay.vst3\""
          ;!@InstallEnd@!
          "@ | Out-File -Encoding ASCII -FilePath dist\install-config.txt

      - name: Package VST3
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build\TapeDelay_artefacts\Release\VST3\TapeDelay.vst3 -DestinationPath dist\CockAmps-TapeDelay-windows.vst3.zip

      - name: Create self-extracting installer
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          copy /b "C:\Program Files\7-Zip\7z.sfx" + "dist\install-config.txt" + "dist\CockAmps-TapeDelay-windows.vst3.zip" "dist\CockAmps-TapeDelay-windows-installer.exe"

      - name: Upload VST3 artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: windows-vst3
          path: dist/CockAmps-TapeDelay-windows.vst3.zip

      - name: Upload Windows installer
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/CockAmps-TapeDelay-windows-installer.exe

  release:
    runs-on: ubuntu-22.04
    needs: [linux, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
          generate_release_notes: true
